<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">Portfolio.</div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="skill.html">Skills</a></li>
                <li><a href="project.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <style>
        body {
    margin: 0;
    background: #0d1b2a;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}
/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
}

.logo {
    font-size: 26px;
    font-weight: bold;
}

.nav-links {
    list-style: none;
    display: flex;
}

.nav-links li {
    margin-left: 30px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 18px;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #00eaff;
}

/* Title */
.title {
    font-size: 40px;
    margin-top: 50px;
}

.title span {
    color: #00d4ff;
}

/* Cards */
.project-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
}

.card {
    width: 280px;
    height: 180px;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    background: #112f41;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card:hover {
    transform: scale(1.05);
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1b263b;
    padding: 25px;
    width: 400px;
    border-radius: 10px;
    animation: fadeIn 0.3s;
    text-align: left;
}

.close {
    float: right;
    font-size: 28px;
    cursor: pointer;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}
    </style>
</head>
<body>

    <section class="projects">
        <h1 class="title">Latest<span>Project</span></h1>

        <div class="project-container">
            
            <!-- Project 1 -->
            <div class="card" onclick="openModal('project1')">
                <img src="app.jpeg" alt="Project 1">
            </div>

            <!-- Project 2 -->
            <div class="card" onclick="openModal('project2')">
                <img src="ui.jpeg" alt="Project 2">
            </div>

            <!-- Project 3 -->
            <div class="card" onclick="openModal('project3')">
                <img src="eda.png" alt="Project 3">
            </div>
        </div>
    </section>

    <!-- Modal Background -->
    <div id="modal" class="modal">
        <div class="modal-content">

            <span class="close" onclick="closeModal()">&times;</span>

            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>

        </div>
    </div>

    <script>
        function openModal(project) {
    const modal = document.getElementById("modal");
    const title = document.getElementById("modal-title");
    const text = document.getElementById("modal-text");

    if (project === "project1") {
        title.innerHTML = "Website Development";
        text.innerHTML = "Built a full responsive mobile website using clean HTML and modern CSS. Focused on fast loading, mobile-friendly styling and a seamless user experience.";
    }

    if (project === "project2") {
        title.innerHTML = "UI/UX Mobile App Design";
        text.innerHTML = "This project involves designing a user-friendly mobile app interface in figma with a clean and modern layout. Developed high fidelity interactive prototypes to deliver a seamless and engaging user experience.";
    }

    if (project === "project3") {
        title.innerHTML = "EDA and Data Visualization";
        text.innerHTML = "Explored the dataset to understand structure, missing values and outliers.Analysed relationship between features to uncover key patterns. Used visualization to clearly present trends and insights";
    }

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
    </script>
</body>
</html>
